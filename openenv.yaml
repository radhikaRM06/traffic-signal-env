name: traffic-signal-control
version: "1.0.0"
description: >
  Real-world traffic signal control environment. An AI agent manages
  urban intersection signal phases to minimize vehicle wait times,
  reduce congestion, and optimize traffic flow.
author: radhikamishra
tags:
  - openenv
  - traffic
  - urban-mobility
  - reinforcement-learning
  - real-world

environment:
  type: traffic_signal_control
  action_space: discrete
  observation_space: structured
  episode_steps_max: 200

tasks:
  - id: single_intersection_easy
    name: "Single Intersection Control"
    difficulty: easy
    max_steps: 100
    success_threshold: 0.6

  - id: arterial_corridor_medium
    name: "Arterial Corridor Optimization"
    difficulty: medium
    max_steps: 150
    success_threshold: 0.65

  - id: urban_grid_hard
    name: "Urban Grid Network Control"
    difficulty: hard
    max_steps: 200
    success_threshold: 0.7

api:
  reset: POST /reset
  step: POST /step
  state: GET /state
  health: GET /health

server:
  entry_point: "server.app:app"
  main: "server.app:main"
  port: 7860
